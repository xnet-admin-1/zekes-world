# Zeek's World - default engine settings
# These get applied when the game is selected

# Creative mode only - no survival
creative_mode = true
enable_damage = false

# Simplified gameplay
enable_pvp = false
enable_hunger = false

# Kid-friendly defaults
time_speed = 0

# Map generation
mg_name = singlenode

# Spawn above ground
static_spawnpoint = 0, 5, 0

# Controls
aux1_descends = false

# Performance
viewing_range = 120
dedicated_server_step = 0.05

# Touch/mobile
touch_use_crosshair = true
touchscreen_threshold = 20

# Disable things that add complexity
enable_minimap = false
